name: Build openvpn-gw image

on:
  push:
    paths:
      - 'openvpn-gw/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./openvpn-gw
          push: true
          tags: ghcr.io/sepidre/openvpn-gw:latest